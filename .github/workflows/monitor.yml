name: Run Monitor Checks

on:
  schedule:
    # Runs every 5 minutes (GitHub Actions minimum)
    - cron: '*/5 * * * *'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Ping checker endpoint
        run: |
          curl -f -s \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            https://sitewatch-brown.vercel.app/api/cron \
            | cat
